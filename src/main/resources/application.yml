server:
  port: 8080

spring:
  application:
    name: zerodha-trading-bot
    version: "4.5"

  # Database Configuration (H2 for development)
  datasource:
    url: jdbc:h2:file:./data/tradingbot;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;LOCK_TIMEOUT=10000
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      # HFT Optimization: Larger pool to handle async persistence + queries
      maximum-pool-size: 15
      minimum-idle: 5
      # Fast connection timeouts for HFT
      connection-timeout: 5000
      # Aggressive idle timeout to reclaim unused connections
      idle-timeout: 60000
      max-lifetime: 1800000
      # Leak detection for debugging (disable in prod for performance)
      leak-detection-threshold: 30000
      # Pool name for monitoring
      pool-name: HFT-HikariPool

  # JPA/Hibernate Configuration
  jpa:
    # database-platform is auto-detected by Hibernate 6+ from JDBC URL
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # H2 Console (development only)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  # Flyway Migration (disabled for now, using Hibernate auto-ddl)
  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration

# Kite Connect Configuration
kite:
  api-key: ${KITE_API_KEY:4u07o35o6w5uhd2r}
  api-secret: ${KITE_API_SECRET:n4ex6pjf9ldhtpngrsyzqhjbgyi8tgtt}
  access-token: ${KITE_ACCESS_TOKEN:}
  login-url: https://kite.zerodha.com/connect/login

# Paper Trading Configuration
trading:
  # Master switch: true = Paper Trading, false = Live Trading
  paper-trading-enabled: true

  # Initial virtual balance for paper trading (in INR)
  initial-balance: 1000000.0

  # Brokerage and charges
  apply-brokerage-charges: true
  brokerage-per-order: 20.0
  stt-percentage: 0.025
  transaction-charges: 0.00325
  gst-percentage: 18.0
  sebi-charges: 0.0001
  stamp-duty: 0.003

  # Execution settings
  slippage-percentage: 0.05
  enable-execution-delay: true
  execution-delay-ms: 500
  enable-order-rejection: false
  rejection-probability: 0.02

# Strategy Configuration
strategy:
  # Default stop loss in points (can be overridden via API request)
  default-stop-loss-points: 2.0

  # Default target in points (can be overridden via API request)
  default-target-points: 2.0

  # Short Strangle Configuration
  # Delta values for sell legs (main premium-generating legs)
  short-strangle-sell-delta: 0.4
  # Delta values for hedge legs (risk protection)
  short-strangle-hedge-delta: 0.1

  # Sell ATM Straddle Hedge Configuration
  # Enable/disable hedge legs (buy OTM CE + PE) for margin reduction
  sell-straddle-hedge-enabled: true
  # Target delta for hedge (buy) legs in sell ATM straddle
  sell-straddle-hedge-delta: 0.1

  # Entry Time Window Configuration (IST)
  # No entries before this time (avoid opening noise and gaps)
  entry-window-start: "10:00"
  # No entries after this time (insufficient theta remaining)
  entry-window-end: "15:00"

  # Expiry Day Configuration
  # Whether to allow trading on expiry day (true = allow with tighter thresholds)
  expiry-day-enabled: true
  # Tighter entry end time on expiry day (gamma acceleration)
  expiry-day-entry-end-time: "13:00"


  # Trailing Stop Loss Configuration
  # When enabled, stop loss trails up as position becomes profitable
  trailing-stop-enabled: false

  # Activation threshold: trailing stop activates when cumulative P&L >= this value
  # Example: 1.0 means trailing starts after 1 point profit

# Volatility Filter Configuration (India VIX based)
volatility:
  # Enable/disable the VIX volatility filter for straddle placement
  enabled: true

  # Symbol for India VIX in Kite format
  vix-symbol: "NSE:INDIA VIX"

  # Instrument token for India VIX (for historical data API)
  vix-instrument-token: "264969"

  # Absolute VIX threshold - allow trade if VIX >= this value (adequate premium)
  absolute-threshold: 12.5

  # 5-minute percentage change threshold (legacy — kept for reference)
  percentage-change-threshold: 0.3

  # Spike threshold: block trade if VIX 5-min change > this % (danger signal for seller)
  spike-threshold-pct: 1.0

  # Block if VIX > this % above previous day close (escalating vol = risky for seller)
  max-vix-above-prev-close-pct: 5.0

  # Enable volatility filter during backtesting (false = preserve existing backtest behavior)
  backtest-enabled: false

  # Fail-safe: allow trade if VIX data is unavailable
  allow-on-data-unavailable: true

  # Cache TTL for VIX data in milliseconds (default: 1 minute)
  cache-ttl-ms: 60000
  trailing-activation-points: 2.5

  # Trail distance: how far behind the high-water mark the stop trails
  # Example: 0.5 means stop is always 0.5 points below peak profit
  trailing-distance-points: 2.5

  # Auto square off settings (time-based forced exit)
  # Forces exit of all active positions at the configured time regardless of P&L
  auto-square-off-enabled: true
  auto-square-off-time: "15:10"  # HH:mm format (IST) - default 3:10 PM
  auto-square-off-backtest-enabled: true  # Enable forced exit during backtesting
  auto-restart-enabled: true
  auto-restart-paper-enabled: true

  # ==================== NEUTRAL MARKET RESTART CONFIGURATION ====================
  # MarketStateUpdater evaluates neutral market conditions at this interval and
  # publishes MarketStateEvent. StrategyRestartScheduler listens for neutral events
  # to trigger buffered strategy re-entry. No per-execution polling loops.
  neutral-market-poll-interval-ms: 30000   # Evaluation cycle every 30 seconds (default)
  neutral-market-buffer-ms: 60000          # Wait 1 minute after neutral detected (default)

  # ==================== DAILY P&L THRESHOLD CONFIGURATION ====================
  # Maximum cumulative daily profit (in INR) before auto-restart is halted and bot is stopped.
  # Set to 0 to disable. Example: 5000 = stop after ₹5,000 daily profit.
  daily-max-profit: 2500

  # Maximum cumulative daily loss (in INR, positive number) before auto-restart is halted.
  # Set to 0 to disable. Example: 3000 = stop after ₹3,000 daily loss.
  daily-max-loss: 2500

  # ==================== PREMIUM-BASED EXIT CONFIGURATION ====================
  # Dynamic exit based on percentage change from combined entry premium.
  # When enabled, replaces fixed-point MTM exits with premium decay/expansion logic.

  # Enable premium-based exit mode (default: false = use fixed-point MTM)
  premium-based-exit-enabled: false

  # Target decay percentage: exit (profit) when combined LTP <= entry * (1 - targetDecayPct)
  # Accepts both formats:
  #   - Whole percentages (1-100): e.g., 5 for 5%
  #   - Decimal fractions (0.01-1.0): e.g., 0.05 for 5%
  # Example: 5 or 0.05 = 5% decay = exit when premium drops 5% from entry
  target-decay-pct: 5

  # Stop loss expansion percentage: exit (loss) when combined LTP >= entry * (1 + stopLossExpansionPct)
  # Accepts both formats:
  #   - Whole percentages (1-100): e.g., 10 for 10%
  #   - Decimal fractions (0.01-1.0): e.g., 0.10 for 10%
  # Example: 10 or 0.10 = 10% expansion = exit when premium rises 10% from entry
  stop-loss-expansion-pct: 10


# Neutral Market Detection Engine Configuration
neutral-market:
  # Master switch: enable neutral market filter before ATM straddle entry
  enabled: true

  # Minimum score (0-10) to allow trade. Each signal contributes +2.
  minimum-score: 6

  # Tighter minimum score on expiry day (elevated gamma risk)
  expiry-day-minimum-score: 8

  # Signal 1: VWAP Deviation (SMA proxy for index — volume unavailable)
  vwap-deviation-threshold: 0.002    # Widened from 0.0015 (SMA proxy, not true VWAP)
  vwap-candle-count: 15              # 1-minute candles for VWAP

  # Signal 2: ADX Trend Strength
  adx-threshold: 20.0                # Standard ranging boundary (was 18)
  adx-period: 7                      # Short-term intraday period (was 14)
  adx-candle-interval: "minute"      # 1-min candles for faster reaction (was 3minute)
  adx-candle-count: 30               # 30 candles warmup — available by 9:45 IST (was 50)
  adx-falling-check-enabled: false   # Optional: require ADX falling

  # Signal 3: Gamma Pin (Max OI Strike)
  gamma-pin-threshold: 0.002         # 0.2% max distance from max-OI strike
  strikes-around-atm: 5              # Reduced from 10 (OI concentrated within ±3 strikes)

  # Signal 4: Range Compression
  range-compression-threshold: 0.0035   # Widened from 0.0025; 0.35% = ~84pts at 24000
  range-compression-candles: 10         # Last 10 one-minute candles
  expiry-day-range-threshold: 0.002     # Tighter on expiry day (0.2% = ~48pts at 24000)

  # Signal 5: Dual Premium Decay
  # NOTE: Must be LESS than cache-ttl-ms to avoid timing race where
  # cache expiry and snapshot interval align, causing perpetual skips.
  premium-snapshot-min-interval-ms: 20000  # Slightly faster (was 25000)
  premium-min-decay-pct: 0.5               # Both CE/PE must decay >= 0.5% to pass
  premium-max-snapshot-age-ms: 120000      # Discard snapshots older than 2 minutes

  # Caching
  cache-ttl-ms: 30000                # Cache result for 30 seconds
  allow-on-data-unavailable: true    # Fail-safe: allow trade if data fails

  # ==================== V2: PRICE OSCILLATION SIGNAL ====================
  oscillation-candle-count: 10       # Number of 1-min candles for chop detection
  oscillation-min-reversals: 4       # Min direction reversals to pass (out of 9 possible)

  # ==================== V2: VWAP PULLBACK ENTRY SIGNAL ====================
  vwap-pullback-threshold: 0.003     # 0.3% deviation from VWAP to qualify as pullback
  vwap-pullback-reversion-threshold: 0.001  # 0.1% — price must revert within this band
  vwap-pullback-candle-count: 8      # Window size for pullback pattern detection

  # ==================== V2: TIME-BASED ADAPTATION ====================
  time-based-adaptation-enabled: true  # Adjust score based on market session time

  # ==================== V2: WEIGHTED SCORING ====================
  weight-vwap: 3                     # VWAP Proximity — highest weight (core signal)
  weight-range: 2                    # Range Compression
  weight-oscillation: 2             # Price Oscillation (chop detection)
  weight-vwap-pullback: 2           # VWAP Pullback Entry (mean-reversion timing)
  weight-adx: 1                     # ADX Trend — low weight (confirmatory)
  weight-gamma-pin: 1               # Gamma Pin — expiry day only

  # ==================== V2: REGIME THRESHOLDS ====================
  strong-neutral-threshold: 6        # Score >= 6 → STRONG_NEUTRAL (full position)
  weak-neutral-threshold: 4          # Score >= 4 → WEAK_NEUTRAL (tradable, reduced size)

# ==================== NEUTRAL MARKET V3: 3-LAYER DETECTION ENGINE ====================
# Three-layer tradable opportunity detector:
#   Layer 1 (Regime):        Macro neutrality (VWAP, range, oscillation, ADX, gamma pin)
#   Layer 2 (Microstructure): Immediate tradable signal (pullback, HF oscillation, range)
#   Layer 3 (Breakout Risk):  Safety gate (blocks entry before breakout)
neutral-market-v3:
  enabled: true
  allow-on-data-unavailable: true
  cache-ttl-ms: 15000                          # 15s TTL — fast refresh for micro signals

  # --- Regime Layer: Weights ---
  weight-vwap-proximity: 3                     # Highest weight — core mean-reversion signal
  weight-range-compression: 2                  # Tight range = low vol = safe for straddle
  weight-oscillation: 2                        # Chop detection via direction reversals
  weight-adx: 1                                # Confirmatory only (lagging indicator)
  weight-gamma-pin: 1                          # Expiry day only — gamma pin effect

  # --- Regime Layer: Thresholds ---
  vwap-proximity-threshold: 0.002              # 0.2% max deviation from VWAP
  vwap-candle-count: 15                        # 1-min candles for VWAP SMA proxy
  range-compression-threshold: 0.0035          # 0.35% = ~84pts at NIFTY 24000
  range-compression-candles: 10                # Last 10 one-minute candles
  oscillation-candle-count: 10                 # 10 candles for direction flip count
  oscillation-min-reversals: 4                 # Minimum 4 reversals out of 9 possible
  adx-threshold: 20.0                          # ADX < 20 = ranging market
  adx-period: 7                                # Short-term intraday Wilder smoothing
  adx-candle-interval: "minute"                # 1-min candles for fast ADX reaction
  adx-candle-count: 30                         # ~30 min window — available by 9:45 IST
  gamma-pin-threshold: 0.002                   # 0.2% max distance from max-OI strike
  strikes-around-atm: 5                        # ±5 strikes for OI scan

  # --- Regime Layer: Classification ---
  regime-strong-neutral-threshold: 6           # Score >= 6 → STRONG_NEUTRAL
  regime-weak-neutral-threshold: 4             # Score >= 4 → WEAK_NEUTRAL

  # --- Microstructure Layer: Weights ---
  weight-micro-vwap-pullback: 2                # VWAP pullback reversal momentum
  weight-micro-oscillation: 2                  # HF oscillation (flips + small amplitude)
  weight-micro-range-stability: 1              # Micro range stability

  # --- Microstructure Layer: Thresholds ---
  micro-vwap-pullback-deviation-threshold: 0.0015  # 0.15% min deviation to qualify as "away"
  micro-vwap-pullback-candles: 5               # Window for pullback pattern detection
  micro-vwap-pullback-slope-candles: 3         # Last 3 candles must revert toward VWAP
  micro-oscillation-candles: 8                 # Shorter window than regime (immediacy)
  micro-oscillation-min-flips: 4               # Minimum direction flips
  micro-oscillation-max-avg-move: 0.001        # 0.1% max avg move per candle (small amplitude)
  micro-range-candles: 5                       # Last 5 candles for micro range check
  micro-range-threshold: 0.001                 # 0.1% = ~24pts at NIFTY 24000

  # --- Breakout Risk Layer ---
  breakout-tight-range-threshold: 0.0015       # 0.15% — very tight consolidation
  breakout-range-candles: 10                   # Candles to compute breakout range
  breakout-edge-proximity-pct: 0.2             # Within 20% of range from edge
  breakout-momentum-candles: 3                 # 3 consecutive same-direction candles

  # --- Time-Based Adaptation ---
  time-based-adaptation-enabled: true          # 09:15-10:00 → −1, 13:30-15:00 → +1

# ==================== MARKET DATA ENGINE CONFIGURATION ====================
# Centralized, high-performance background service that pre-computes and caches
# all market data so strategy execution reads from cache only (zero-latency path).
# When enabled, spot price fetch, delta calculation, and option chain lookups
# are pre-computed on scheduled refresh cycles — eliminating the 10-15 second
# inline computation bottleneck during strategy execution.
market-data-engine:
  # Master switch: enable/disable the engine (true = use engine, false = legacy inline API calls)
  enabled: true

  # Spot price refresh interval (ms). NIFTY/BANKNIFTY prices updated at this rate.
  # Tighter = more accurate ATM strike, but costs more API calls.
  spot-price-refresh-ms: 1000    # 1 second

  # Option chain refresh interval (ms). Instruments are static intraday.
  option-chain-refresh-ms: 60000  # 60 seconds

  # Delta pre-computation refresh interval (ms). ATM strike + per-strike deltas.
  # This is the key optimization: replaces the 10-15 second inline computation.
  delta-refresh-ms: 5000          # 5 seconds

  # VWAP refresh interval (ms).
  vwap-refresh-ms: 5000           # 5 seconds

  # Candle data refresh interval (ms).
  candle-refresh-ms: 60000        # 60 seconds

  # Cache TTLs — how long data is considered fresh for strategy consumption
  spot-price-ttl-ms: 2000         # 2 seconds (tight for ATM accuracy)
  option-chain-ttl-ms: 120000     # 2 minutes (instruments are static)
  delta-ttl-ms: 10000             # 10 seconds (allows 2 missed refresh cycles)
  vwap-ttl-ms: 10000              # 10 seconds
  candle-ttl-ms: 120000           # 2 minutes

  # Background thread pool size
  thread-pool-size: 4

  # Supported instruments (comma-separated)
  supported-instruments: NIFTY

  # Delta pre-computation: target deltas to pre-compute strikes for (comma-separated)
  # Must cover all strategy requirements: ATM (0.5), strangle sell (0.4), hedges (0.1), etc.
  delta-targets: "0.05,0.1,0.15,0.2,0.25,0.3,0.35,0.4,0.45,0.5"

  # Strike scan range: number of strikes on each side of ATM for near-ATM targets (Δ ≥ 0.3)
  delta-strike-range-near-atm: 10

  # Strike scan range: number of strikes on each side of ATM for far OTM targets (Δ < 0.3)
  # Must be wide enough for 0.1Δ and 0.05Δ hedge legs (typically 15-30 strikes from ATM)
  delta-strike-range-far-otm: 30


# Historical Replay Configuration
historical:
  replay:
    # Milliseconds to sleep per simulated second during historical replay
    # Set to 0 for fastest possible replay
    sleep-millis-per-second: 2

# Persistence Configuration
persistence:
  # Enable/disable persistence globally
  enabled: true

  # Data retention settings (in days)
  retention:
    trades-days: 365
    delta-snapshots-days: 90
    position-snapshots-days: 180
    order-timing-days: 90
    alerts-days: 90
    mtm-snapshots-days: 30
    strategy-config-days: 365
    websocket-events-days: 30
    system-health-days: 7

  # Cleanup job settings
  cleanup:
    enabled: true
    cron: "0 0 2 * * ?"  # Run at 2 AM daily


# Backtesting Configuration
backtest:
  enabled: true
  max-cache-size: 100
  async-pool-size: 4
  default-candle-interval: minute
  rate-limit-delay-ms: 350


# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.tradingbot: DEBUG
    # Neutral market detector: DEBUG shows all calculation internals.
    # Includes candle counts, volume availability, ADX series lengths, OI aggregation.
    com.tradingbot.service.strategy.NeutralMarketDetectorService: DEBUG
    # V3 detector: DEBUG shows per-signal evaluation, INFO shows final decision only.
    com.tradingbot.service.strategy.NeutralMarketDetectorServiceV3: DEBUG
    # Suppress Hibernate JTA platform warning (not needed for local transactions)
    org.hibernate.engine.transaction.jta.platform.internal: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
